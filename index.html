<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>生日快乐</title>
  <style>
    :root {
      --ink: #161313;
      --velvet: #3e1f2f;
      --wine: #8f3f4d;
      --rose: #d88c7a;
      --cream: #fff3df;
      --champagne: #e5c486;
      --sage: #7fa88d;
      --paper: rgba(255, 246, 229, 0.94);
      --shadow: rgba(19, 12, 12, 0.35);
      font-family: ui-serif, "Songti SC", "Noto Serif CJK SC", "STSong", Georgia, serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--ink);
      color: var(--cream);
    }

    body {
      min-height: 100svh;
    }

    button {
      font: inherit;
    }

    .scene {
      position: relative;
      display: grid;
      min-height: 100svh;
      padding: max(18px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
      place-items: center;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 36%, rgba(229, 196, 134, 0.24), transparent 26%),
        radial-gradient(circle at 18% 12%, rgba(127, 168, 141, 0.18), transparent 24%),
        linear-gradient(145deg, #151313 0%, #25151b 35%, #402232 65%, #181716 100%);
    }

    .scene::before {
      position: absolute;
      inset: 0;
      z-index: -2;
      content: "";
      background-image:
        linear-gradient(rgba(255, 243, 223, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 243, 223, 0.04) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
    }

    .scene::after {
      position: absolute;
      inset: auto 0 0;
      z-index: -1;
      height: 34%;
      content: "";
      background:
        radial-gradient(ellipse at 50% 30%, rgba(255, 218, 157, 0.18), transparent 60%),
        linear-gradient(180deg, transparent 0%, rgba(4, 3, 3, 0.52) 100%);
    }

    .card {
      width: min(100%, 430px);
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: rgba(255, 243, 223, 0.72);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      font-size: 12px;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      color: var(--cream);
      font-size: clamp(31px, 10vw, 48px);
      font-weight: 600;
      line-height: 1.08;
      text-shadow: 0 8px 32px rgba(0, 0, 0, 0.34);
    }

    .subtitle {
      width: min(310px, 86%);
      margin: 14px auto 0;
      color: rgba(255, 243, 223, 0.76);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      font-size: 14px;
      line-height: 1.8;
    }

    .stage {
      position: relative;
      display: grid;
      width: min(94vw, 390px);
      height: min(66svh, 520px);
      min-height: 410px;
      margin: 18px auto 0;
      place-items: end center;
    }

    .plate {
      position: absolute;
      right: 3%;
      bottom: 30px;
      left: 3%;
      height: 38px;
      border: 1px solid rgba(255, 243, 223, 0.34);
      border-radius: 50%;
      background:
        linear-gradient(180deg, rgba(255, 243, 223, 0.74), rgba(184, 141, 109, 0.52)),
        radial-gradient(ellipse at 50% 30%, rgba(255, 255, 255, 0.84), transparent 62%);
      box-shadow: 0 22px 42px rgba(0, 0, 0, 0.36);
    }

    .cake-button {
      position: relative;
      width: min(342px, 86vw);
      height: 326px;
      margin-bottom: 42px;
      padding: 0;
      border: 0;
      outline: 0;
      cursor: pointer;
      appearance: none;
      background: transparent;
      filter: drop-shadow(0 34px 42px rgba(0, 0, 0, 0.34));
      transform-origin: 50% 86%;
      transition: transform 240ms ease;
    }

    .cake-button:active {
      transform: scale(0.985) translateY(2px);
    }

    .cake {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 100%;
      height: 238px;
      transform: translateX(-50%);
    }

    .tier {
      position: absolute;
      left: 50%;
      overflow: hidden;
      border: 1px solid rgba(255, 243, 223, 0.2);
      border-radius: 28px 28px 16px 16px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.2), transparent 18%, transparent 72%, rgba(61, 24, 39, 0.24)),
        radial-gradient(circle at 25% 34%, rgba(255, 255, 255, 0.26) 0 5px, transparent 6px),
        radial-gradient(circle at 62% 48%, rgba(255, 255, 255, 0.2) 0 4px, transparent 5px),
        linear-gradient(180deg, #f5b7a0 0%, #b95c62 42%, #7c4055 100%);
      box-shadow:
        inset 0 5px 0 rgba(255, 246, 229, 0.28),
        inset 0 -15px 22px rgba(52, 20, 34, 0.32),
        0 18px 28px rgba(0, 0, 0, 0.18);
      transform: translateX(-50%);
    }

    .tier::before {
      position: absolute;
      top: -18px;
      right: -8px;
      left: -8px;
      height: 44px;
      content: "";
      border-radius: 50%;
      background:
        radial-gradient(circle at 12% 70%, #fff1db 0 14px, transparent 15px),
        radial-gradient(circle at 25% 74%, #fff1db 0 16px, transparent 17px),
        radial-gradient(circle at 40% 72%, #fff1db 0 14px, transparent 15px),
        radial-gradient(circle at 55% 75%, #fff1db 0 17px, transparent 18px),
        radial-gradient(circle at 72% 72%, #fff1db 0 14px, transparent 15px),
        radial-gradient(circle at 88% 74%, #fff1db 0 16px, transparent 17px),
        linear-gradient(180deg, #fff8ec, #f4c99f);
      box-shadow: inset 0 6px 0 rgba(255, 255, 255, 0.54);
    }

    .tier::after {
      position: absolute;
      right: 16px;
      bottom: 12px;
      left: 16px;
      height: 10px;
      content: "";
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 243, 223, 0.28), transparent);
    }

    .tier-bottom {
      bottom: 0;
      width: 100%;
      height: 92px;
      border-radius: 30px 30px 22px 22px;
    }

    .tier-middle {
      bottom: 72px;
      width: 78%;
      height: 82px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.22), transparent 18%, transparent 72%, rgba(61, 24, 39, 0.22)),
        radial-gradient(circle at 32% 44%, rgba(255, 255, 255, 0.24) 0 4px, transparent 5px),
        radial-gradient(circle at 75% 36%, rgba(255, 255, 255, 0.2) 0 5px, transparent 6px),
        linear-gradient(180deg, #f7c4a9 0%, #c56865 44%, #8f3f4d 100%);
    }

    .tier-top {
      bottom: 136px;
      width: 58%;
      height: 72px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.24), transparent 20%, transparent 72%, rgba(61, 24, 39, 0.22)),
        radial-gradient(circle at 35% 48%, rgba(255, 255, 255, 0.24) 0 4px, transparent 5px),
        linear-gradient(180deg, #ffd0b4 0%, #d0786c 46%, #9a4e5b 100%);
    }

    .ribbon {
      position: absolute;
      right: 12px;
      bottom: 30px;
      left: 12px;
      height: 16px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 16% 50%, var(--champagne) 0 4px, transparent 5px),
        radial-gradient(circle at 34% 50%, var(--sage) 0 4px, transparent 5px),
        radial-gradient(circle at 52% 50%, var(--champagne) 0 4px, transparent 5px),
        radial-gradient(circle at 70% 50%, var(--sage) 0 4px, transparent 5px),
        radial-gradient(circle at 88% 50%, var(--champagne) 0 4px, transparent 5px),
        rgba(255, 243, 223, 0.2);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    .pearls {
      position: absolute;
      inset: 0;
    }

    .pearls span {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--champagne);
      box-shadow:
        inset 2px 2px 0 rgba(255, 255, 255, 0.52),
        0 2px 4px rgba(48, 24, 28, 0.22);
    }

    .pearls span:nth-child(1) { left: 18%; top: 37%; }
    .pearls span:nth-child(2) { left: 42%; top: 52%; background: #fff0d7; }
    .pearls span:nth-child(3) { left: 67%; top: 39%; background: var(--sage); }
    .pearls span:nth-child(4) { left: 82%; top: 58%; }
    .tier-middle .pearls span:nth-child(1) { left: 19%; top: 44%; background: #fff0d7; }
    .tier-middle .pearls span:nth-child(2) { left: 52%; top: 41%; }
    .tier-middle .pearls span:nth-child(3) { left: 75%; top: 57%; background: var(--sage); }
    .tier-top .pearls span:nth-child(1) { left: 25%; top: 50%; }
    .tier-top .pearls span:nth-child(2) { left: 61%; top: 44%; background: #fff0d7; }

    .candle {
      position: absolute;
      top: 42px;
      left: 50%;
      width: 32px;
      height: 92px;
      border-radius: 10px 10px 5px 5px;
      background:
        repeating-linear-gradient(-38deg, #fff5e5 0 9px, #ba4b5a 9px 16px);
      box-shadow:
        inset -4px 0 0 rgba(108, 37, 53, 0.18),
        0 8px 18px rgba(0, 0, 0, 0.24);
      transform: translateX(-50%);
    }

    .candle::after {
      position: absolute;
      top: -5px;
      left: 50%;
      width: 3px;
      height: 9px;
      content: "";
      border-radius: 999px;
      background: #342020;
      transform: translateX(-50%);
    }

    .flame {
      position: absolute;
      top: -46px;
      left: 50%;
      width: 34px;
      height: 48px;
      border-radius: 48% 52% 45% 45%;
      background:
        radial-gradient(circle at 50% 64%, #fff8c9 0 14%, transparent 15%),
        radial-gradient(circle at 50% 64%, #ffcb65 0 36%, transparent 37%),
        linear-gradient(180deg, #fff2a8, #f47755 70%, #b13e42);
      box-shadow:
        0 0 18px rgba(255, 211, 105, 0.92),
        0 0 50px rgba(244, 119, 85, 0.7),
        0 0 88px rgba(229, 196, 134, 0.42);
      transform: translateX(-50%) rotate(-5deg);
      transform-origin: 50% 88%;
      animation: flicker 1.6s infinite ease-in-out;
      transition: opacity 520ms ease, transform 520ms ease, filter 520ms ease;
    }

    .smoke {
      position: absolute;
      top: -56px;
      left: 50%;
      width: 80px;
      height: 92px;
      pointer-events: none;
      opacity: 0;
      transform: translateX(-50%);
    }

    .smoke span {
      position: absolute;
      bottom: 0;
      width: 16px;
      height: 16px;
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: 50%;
      filter: blur(1px);
      opacity: 0;
    }

    .smoke span:nth-child(1) { left: 21px; }
    .smoke span:nth-child(2) { left: 35px; animation-delay: 180ms; }
    .smoke span:nth-child(3) { left: 47px; animation-delay: 340ms; }

    .hint {
      position: absolute;
      bottom: 2px;
      left: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 8px 15px;
      border: 1px solid rgba(229, 196, 134, 0.45);
      border-radius: 999px;
      background: rgba(16, 13, 13, 0.42);
      color: rgba(255, 243, 223, 0.86);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      font-size: 13px;
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
      transform: translateX(-50%);
      transition: opacity 320ms ease, transform 320ms ease;
      white-space: nowrap;
    }

    .blown .flame {
      opacity: 0;
      filter: blur(5px);
      transform: translateX(-50%) translateY(-18px) scale(0.42);
    }

    .blown .smoke {
      opacity: 1;
    }

    .blown .smoke span {
      animation: smoke 1.9s ease-out forwards;
    }

    .started .hint {
      opacity: 0;
      transform: translateX(-50%) translateY(8px);
    }

    .wish-layer,
    .final-layer,
    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .confetti {
      z-index: 2;
    }

    .wish-layer {
      z-index: 3;
    }

    .wish-note {
      position: absolute;
      width: min(210px, 68vw);
      min-height: 78px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 243, 223, 0.62);
      border-radius: 8px;
      background: var(--paper);
      color: #402630;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.26);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      font-size: 15px;
      font-weight: 550;
      line-height: 1.55;
      opacity: 0;
      transform: translate(-50%, -50%) rotate(var(--r)) scale(0.76);
      animation: note-pop 4.1s cubic-bezier(.18, .92, .22, 1) forwards;
    }

    .wish-note::before {
      position: absolute;
      top: -8px;
      left: 50%;
      width: 36px;
      height: 15px;
      content: "";
      border-radius: 999px;
      background: rgba(229, 196, 134, 0.72);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.45) inset;
      transform: translateX(-50%) rotate(-4deg);
    }

    .wish-note[data-tone="rose"] { border-color: rgba(216, 140, 122, 0.82); }
    .wish-note[data-tone="sage"] { border-color: rgba(127, 168, 141, 0.82); }
    .wish-note[data-tone="gold"] { border-color: rgba(229, 196, 134, 0.88); }

    .final-layer {
      z-index: 4;
      display: grid;
      padding: 24px;
      place-items: center;
      opacity: 0;
      background: rgba(14, 10, 10, 0.34);
      backdrop-filter: blur(2px);
      transition: opacity 850ms ease;
    }

    .final-layer.show {
      opacity: 1;
    }

    .final-message {
      width: min(92vw, 560px);
      text-align: center;
      transform: translateY(20px) scale(0.94);
      opacity: 0;
    }

    .final-layer.show .final-message {
      animation: final-rise 1050ms cubic-bezier(.18, .9, .2, 1) forwards;
    }

    .final-title {
      margin: 0;
      color: #fff5df;
      font-size: clamp(46px, 14vw, 88px);
      font-weight: 650;
      line-height: 1.02;
      text-shadow:
        0 5px 0 rgba(143, 63, 77, 0.38),
        0 18px 45px rgba(0, 0, 0, 0.46);
    }

    .final-name {
      margin-top: 14px;
      color: rgba(255, 243, 223, 0.82);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      font-size: clamp(15px, 4.2vw, 19px);
      line-height: 1.7;
    }

    .again {
      pointer-events: auto;
      margin-top: 24px;
      padding: 11px 18px;
      border: 1px solid rgba(229, 196, 134, 0.62);
      border-radius: 999px;
      background: rgba(255, 243, 223, 0.1);
      color: var(--cream);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

    .petals {
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .petals span {
      position: absolute;
      width: 7px;
      height: 18px;
      border-radius: 999px;
      background: rgba(216, 140, 122, 0.72);
      opacity: 0.42;
      transform: rotate(var(--tilt));
      animation: drift var(--speed) linear infinite;
    }

    .petals span:nth-child(1) { left: 8%; top: 20%; --tilt: 26deg; --speed: 9s; }
    .petals span:nth-child(2) { left: 78%; top: 16%; --tilt: -18deg; --speed: 11s; background: rgba(229, 196, 134, 0.72); }
    .petals span:nth-child(3) { left: 18%; top: 72%; --tilt: -34deg; --speed: 10s; background: rgba(127, 168, 141, 0.62); }
    .petals span:nth-child(4) { left: 88%; top: 66%; --tilt: 40deg; --speed: 12s; }
    .petals span:nth-child(5) { left: 52%; top: 9%; --tilt: -11deg; --speed: 13s; background: rgba(255, 243, 223, 0.5); }

    @keyframes flicker {
      0%, 100% { transform: translateX(-50%) rotate(-5deg) scale(1); }
      35% { transform: translateX(-50%) rotate(4deg) scale(1.06, 0.94); }
      70% { transform: translateX(-50%) rotate(-2deg) scale(0.95, 1.08); }
    }

    @keyframes smoke {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.4);
      }
      20% { opacity: 0.72; }
      100% {
        opacity: 0;
        transform: translateY(-78px) translateX(var(--x, 8px)) scale(2.2);
      }
    }

    @keyframes note-pop {
      0% {
        opacity: 0;
        transform: translate(-50%, -40%) rotate(var(--r)) scale(0.62);
      }
      18%, 78% {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(var(--r)) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -62%) rotate(var(--r)) scale(0.92);
      }
    }

    @keyframes final-rise {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes drift {
      0% { transform: translate3d(0, -20px, 0) rotate(var(--tilt)); }
      100% { transform: translate3d(12px, 42px, 0) rotate(calc(var(--tilt) + 90deg)); }
    }

    @media (max-width: 360px) {
      .stage {
        min-height: 382px;
      }

      .cake-button {
        width: 292px;
        height: 296px;
      }

      .cake {
        height: 214px;
      }

      .tier-bottom {
        height: 84px;
      }

      .tier-middle {
        bottom: 66px;
        height: 74px;
      }

      .tier-top {
        bottom: 122px;
        height: 66px;
      }

      .candle {
        height: 84px;
        top: 36px;
      }

      .subtitle {
        font-size: 13px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="scene" aria-live="polite">
    <div class="petals" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <section class="card">
      <p class="eyebrow">Make a quiet wish</p>
      <h1 id="headline">今晚的愿望<br>都为你亮着</h1>
      <p class="subtitle" id="lead">轻轻点一下蛋糕，吹灭蜡烛，然后收下这一整屏认真准备的祝福。</p>

      <div class="stage">
        <div class="plate" aria-hidden="true"></div>
        <button class="cake-button" id="cakeButton" type="button" aria-label="点一下蛋糕，吹灭生日蜡烛">
          <span class="candle" aria-hidden="true">
            <span class="flame"></span>
            <span class="smoke">
              <span style="--x:-18px"></span>
              <span style="--x:8px"></span>
              <span style="--x:22px"></span>
            </span>
          </span>
          <span class="cake" aria-hidden="true">
            <span class="tier tier-bottom">
              <span class="ribbon"></span>
              <span class="pearls"><span></span><span></span><span></span><span></span></span>
            </span>
            <span class="tier tier-middle">
              <span class="ribbon"></span>
              <span class="pearls"><span></span><span></span><span></span></span>
            </span>
            <span class="tier tier-top">
              <span class="ribbon"></span>
              <span class="pearls"><span></span><span></span></span>
            </span>
          </span>
        </button>
        <div class="hint">点一下蛋糕</div>
      </div>
    </section>

    <canvas class="confetti" id="confetti"></canvas>
    <div class="wish-layer" id="wishLayer" aria-hidden="true"></div>
    <div class="final-layer" id="finalLayer" role="dialog" aria-label="生日祝福">
      <div class="final-message">
        <p class="final-title">生日快乐</p>
        <p class="final-name" id="finalName">愿你新的一岁，有鲜花、有答案，也有一直被偏爱的好运气。</p>
        <button class="again" id="againButton" type="button">再许一次愿</button>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const to = params.get("to") || "";
    const from = params.get("from") || "";

    const headline = document.getElementById("headline");
    const lead = document.getElementById("lead");
    const finalName = document.getElementById("finalName");

    if (to) {
      headline.innerHTML = `${escapeText(to)}<br>今晚为你许愿`;
      lead.textContent = "点一下蛋糕，吹灭蜡烛，收下这份只给你的生日祝福。";
      finalName.textContent = `愿 ${to} 新的一岁，漂亮地长大，松弛地快乐，坚定地被爱。${from ? ` - ${from}` : ""}`;
      document.title = `${to}，生日快乐`;
    }

    const cakeButton = document.getElementById("cakeButton");
    const wishLayer = document.getElementById("wishLayer");
    const finalLayer = document.getElementById("finalLayer");
    const againButton = document.getElementById("againButton");
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");
    let particles = [];
    let running = false;
    let started = false;

    const wishes = [
      "愿你今天被鲜花、蛋糕和偏爱包围。",
      "愿所有好事，都像蜡烛一样为你亮起。",
      "新的一岁，继续漂亮、自由、闪闪发光。",
      "愿你有热爱的事，也有笃定爱你的人。",
      "愿快乐不只今天，未来每天都很具体。",
      "愿你想要的，都在路上温柔靠近。",
      "愿这一岁，有好运，有底气，有惊喜。",
      "愿你永远有重新出发的勇气。",
      "愿你被世界认真款待，也被自己温柔照顾。",
      "今晚的星光、掌声和祝福，都属于你。"
    ];

    const tones = ["rose", "sage", "gold"];
    const positions = [
      [22, 30], [72, 26], [50, 18], [27, 58], [74, 60],
      [49, 48], [18, 76], [83, 78], [35, 40], [64, 42]
    ];

    cakeButton.addEventListener("click", startCelebration);
    againButton.addEventListener("click", resetCelebration);
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function startCelebration() {
      if (started) return;
      started = true;
      document.body.classList.add("started");
      cakeButton.classList.add("blown");
      playBirthdaySong();
      burstConfetti(130);

      wishes.forEach((wish, index) => {
        window.setTimeout(() => showWish(wish, index), 700 + index * 430);
      });

      window.setTimeout(() => {
        burstConfetti(190);
        finalLayer.classList.add("show");
      }, 6800);
    }

    function resetCelebration() {
      started = false;
      particles = [];
      wishLayer.innerHTML = "";
      cakeButton.classList.remove("blown");
      document.body.classList.remove("started");
      finalLayer.classList.remove("show");
    }

    function showWish(text, index) {
  const note = document.createElement("div");
  const [x, y] = positions[index % positions.length];
  note.className = "wish-note";
  note.dataset.tone = tones[index % tones.length];
  note.style.left = `clamp(112px, ${jitter(x, 3)}%, calc(100vw - 112px))`;
  note.style.top = `clamp(86px, ${jitter(y, 4)}%, calc(100vh - 110px))`;
  note.style.setProperty("--r", `${jitter(0, 7)}deg`);
  note.textContent = text;
  wishLayer.appendChild(note);
  window.setTimeout(() => note.remove(), 4200);
}

    function burstConfetti(count) {
      const colors = ["#fff3df", "#e5c486", "#d88c7a", "#8f3f4d", "#7fa88d"];
      const originX = window.innerWidth / 2;
      const originY = window.innerHeight * 0.46;

      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 8;
        particles.push({
          x: originX,
          y: originY,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 3,
          size: 5 + Math.random() * 8,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * Math.PI,
          spin: -0.16 + Math.random() * 0.32,
          life: 90 + Math.random() * 70
        });
      }

      if (!running) animateConfetti();
    }

    function animateConfetti() {
      running = true;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter((p) => p.life > 0);

      particles.forEach((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.16;
        p.vx *= 0.992;
        p.rotation += p.spin;
        p.life -= 1;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.globalAlpha = Math.max(0, Math.min(1, p.life / 60));
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 3, p.size, p.size * 0.62);
        ctx.restore();
      });

      if (particles.length) {
        requestAnimationFrame(animateConfetti);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        running = false;
      }
    }

    function resizeCanvas() {
      const ratio = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(window.innerWidth * ratio);
      canvas.height = Math.floor(window.innerHeight * ratio);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function playBirthdaySong() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audio = new AudioContext();
        const freqs = {
          C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23, G4: 392,
          A4: 440, B4: 493.88, C5: 523.25, D5: 587.33, E5: 659.25,
          F5: 698.46, G5: 783.99
        };
        const melody = [
          ["G4", 0.5], ["G4", 0.5], ["A4", 1], ["G4", 1], ["C5", 1], ["B4", 2],
          ["G4", 0.5], ["G4", 0.5], ["A4", 1], ["G4", 1], ["D5", 1], ["C5", 2],
          ["G4", 0.5], ["G4", 0.5], ["G5", 1], ["E5", 1], ["C5", 1], ["B4", 1], ["A4", 2],
          ["F5", 0.5], ["F5", 0.5], ["E5", 1], ["C5", 1], ["D5", 1], ["C5", 2.4]
        ];
        const harmony = {
          C5: "G4", D5: "A4", E5: "C5", F5: "C5", G5: "E5",
          A4: "E4", B4: "G4", G4: "C4"
        };
        const beat = 0.42;
        let cursor = audio.currentTime + 0.06;

        melody.forEach(([note, length], index) => {
          const duration = length * beat;
          playBell(audio, freqs[note], cursor, duration, 0.12);
          if (index % 3 === 0 && harmony[note]) {
            playBell(audio, freqs[harmony[note]], cursor + 0.01, duration * 0.94, 0.045);
          }
          cursor += duration + 0.025;
        });
        window.setTimeout(() => audio.close(), Math.ceil((cursor - audio.currentTime + 0.8) * 1000));
      } catch (error) {
        // Audio is optional; some browsers block it more aggressively inside embedded views.
      }
    }

    function playBell(audio, frequency, start, duration, volume) {
      const carrier = audio.createOscillator();
      const overtone = audio.createOscillator();
      const gain = audio.createGain();
      const overtoneGain = audio.createGain();

      carrier.type = "triangle";
      overtone.type = "sine";
      carrier.frequency.setValueAtTime(frequency, start);
      overtone.frequency.setValueAtTime(frequency * 2.01, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + 0.025);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      overtoneGain.gain.setValueAtTime(volume * 0.28, start);
      overtoneGain.gain.exponentialRampToValueAtTime(0.0001, start + duration * 0.72);

      carrier.connect(gain);
      overtone.connect(overtoneGain);
      gain.connect(audio.destination);
      overtoneGain.connect(audio.destination);
      carrier.start(start);
      overtone.start(start);
      carrier.stop(start + duration + 0.05);
      overtone.stop(start + duration + 0.05);
    }

    function jitter(value, amount) {
      return value + (Math.random() * amount * 2 - amount);
    }

    function escapeText(value) {
      const span = document.createElement("span");
      span.textContent = value;
      return span.innerHTML;
    }
  </script>
</body>
